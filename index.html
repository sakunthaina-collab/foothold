<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ตั้งหลัก — เครื่องมือตั้งหลักเรื่องบัญชีม้า</title>
<meta name="description" content="เครื่องมือฟรีช่วยคนที่บัญชีถูกระงับ/ถูกกล่าวหาเรื่องบัญชีม้า เข้าใจสถานะตัวเอง เตรียมเอกสาร และไปต่อยังธนาคารหรือทนายที่ช่วยได้จริง">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Noto+Serif+Thai:wght@500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1b2734; --navy2:#243341; --gold:#caa75f; --gold2:#a8853f; --gold-soft:#d8b774;
  --gold-ink:#6f5214; --tag-bg:#ece0c4;
  --paper:#ece7da; --card:#faf6ec; --card-line:#e2d9c5; --ink:#2c271f; --ink2:#4d473b;
  --mut:#6f6757; --mut2:#5f5849; --sage:#3f6d5f; --warn:#bd5a3c; --warnbg:#fbeee9;
  --calmbg:#eef4f0; --notebg:#f7f0e2;
  --serif:'Noto Serif Thai',serif; --sans:'IBM Plex Sans Thai',sans-serif; --doc:'Sarabun',sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.6}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#c8bea8;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}
@keyframes scFade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes scPop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
a{color:var(--gold2)}

/* ---------- layout ---------- */
.app{display:flex;min-height:100vh;width:100%}
.sidebar{width:286px;flex-shrink:0;background:var(--navy);color:#e9e2d2;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:24px 22px 20px;border-bottom:1px solid rgba(202,167,95,.22)}
.brand-row{display:flex;align-items:center;gap:11px}
.brand-mark{width:38px;height:38px;border-radius:9px;background:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-mark span{font-family:var(--serif);font-weight:700;font-size:21px;color:var(--navy)}
.brand-name{font-family:var(--serif);font-weight:700;font-size:20px;letter-spacing:.3px;line-height:1}
.brand-en{font-size:11px;letter-spacing:2px;color:var(--gold);margin-top:3px;text-transform:uppercase}
.brand-tag{font-size:12px;color:#9aa3ad;margin-top:13px;line-height:1.5}
.nav{flex:1;overflow-y:auto;padding:16px 13px}
.nav-h{font-size:10.5px;letter-spacing:1.6px;color:#6f7a85;text-transform:uppercase;padding:4px 10px 9px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:10px;cursor:pointer;margin-bottom:3px;transition:background .15s;border:none;background:transparent;color:inherit;width:100%;text-align:left;font-family:var(--sans)}
.nav-item:hover{background:rgba(202,167,95,.10)}
.nav-item.on{background:rgba(202,167,95,.16)}
.nav-item.lock{opacity:.4;cursor:not-allowed}
.nav-num{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;background:rgba(255,255,255,.07);color:#aeb6bf}
.nav-item.on .nav-num{background:var(--gold);color:var(--navy)}
.nav-item.done .nav-num{background:rgba(108,163,108,.22);color:#bcd6bc}
.nav-tx{flex:1;min-width:0}
.nav-lb{font-size:13.5px;font-weight:600;line-height:1.25}
.nav-sb{font-size:11px;color:#79828c;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item.on .nav-sb{color:#c2b89f}
.nav-ck{color:var(--gold);font-size:14px}
.side-foot{padding:15px 17px 18px;border-top:1px solid rgba(202,167,95,.22)}
.lawyer-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--gold);color:var(--navy);border:none;border-radius:9px;padding:12px;font-family:var(--sans);font-weight:700;font-size:14px;cursor:pointer;transition:background .15s}
.lawyer-btn:hover{background:var(--gold-soft)}
.save-ind{display:flex;align-items:center;gap:7px;margin-top:12px;font-size:11.5px;color:#8b95a0}
.save-dot{width:7px;height:7px;border-radius:50%;background:#6ca36c;box-shadow:0 0 0 3px rgba(108,163,108,.2);flex-shrink:0}

.main{flex:1;min-width:0;position:relative}
.wrap{max-width:920px;margin:0 auto;padding:44px 48px 96px}

/* mobile top bar */
.topbar{display:none;align-items:center;gap:12px;background:var(--navy);color:#e9e2d2;padding:13px 16px;position:sticky;top:0;z-index:40}
.topbar .brand-mark{width:32px;height:32px}
.topbar .brand-mark span{font-size:18px}
.topbar-name{font-family:var(--serif);font-weight:700;font-size:17px}
.menu-btn{margin-left:auto;background:rgba(255,255,255,.08);border:none;color:#e9e2d2;border-radius:8px;padding:8px 11px;cursor:pointer;font-size:18px;line-height:1}
.scrim{display:none;position:fixed;inset:0;background:rgba(20,26,33,.55);z-index:45}

/* ---------- content primitives ---------- */
.screen{animation:scFade .4s ease both}
.eyebrow{font-size:12px;letter-spacing:2.5px;color:var(--gold-ink);text-transform:uppercase;font-weight:600}
h1.q{font-family:var(--serif);font-weight:700;font-size:34px;line-height:1.22;margin:13px 0 0}
h2.q{font-family:var(--serif);font-weight:600;font-size:22px;line-height:1.3;margin:34px 0 0}
.lead{font-size:16px;line-height:1.7;color:var(--mut2);max-width:62ch;margin:16px 0 0}
.hero-h{font-size:42px;max-width:18ch}
.hero-h .hl{color:var(--gold-ink)}

.btn-row{display:flex;gap:12px;margin:30px 0 0;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:9px;border-radius:11px;padding:14px 24px;font-family:var(--sans);font-weight:700;font-size:15px;cursor:pointer;border:none;transition:background .15s,border-color .15s,transform .15s}
.btn svg{display:block}
.btn-primary{background:var(--navy);color:#f3ecda}
.btn-primary:hover{background:var(--navy2)}
.btn-ghost{background:transparent;color:var(--navy);border:1.5px solid #c3b89f;font-weight:600}
.btn-ghost:hover{border-color:var(--gold);background:#f3eee2}

.card{background:var(--card);border:1px solid var(--card-line);border-radius:14px}
.card.pad{padding:22px 24px}

.note{display:flex;gap:12px;align-items:flex-start;background:var(--notebg);border:1px solid var(--card-line);border-radius:12px;padding:15px 17px;margin:18px 0 0;font-size:13.5px;line-height:1.6}
.note svg{flex-shrink:0;margin-top:1px}
.note .t{flex:1}
.note.warn{background:var(--warnbg);border-color:#e6c4b6}
.note.calm{background:var(--calmbg);border-color:#cfe0d6}
.note.dark{background:var(--navy);border-color:var(--navy);color:#cdd4dc}

/* status spectrum (signature) */
.spectrum{display:flex;flex-direction:column;gap:10px;margin:24px 0 0}
.opt{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:#fff;border:1.5px solid var(--card-line);border-radius:13px;padding:15px 17px;cursor:pointer;font-family:var(--sans);transition:border-color .14s,background .14s,transform .14s}
.opt:hover{border-color:var(--gold);background:#fbf3e2;transform:translateX(2px)}
.swatch{width:30px;height:30px;border-radius:8px;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
.ttl{display:block;font-weight:700;font-size:15.5px;color:var(--ink)}
.sub{display:block;font-size:12.5px;color:var(--mut);margin-top:2px}
.door{font-size:12px;font-weight:700;padding:6px 11px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.door.bank{background:#e7efe9;color:#356152}
.door.case{background:#ece3d3;color:#7c5320}

/* law cards */
.law{background:var(--card);border:1px solid var(--card-line);border-radius:13px;padding:18px 20px;margin:12px 0 0}
.law .tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--gold-ink);background:var(--tag-bg);padding:4px 10px;border-radius:7px;text-transform:uppercase}
.law h4{font-family:var(--serif);font-weight:600;font-size:17px;margin:11px 0 0;line-height:1.35}
.law p{font-size:14px;line-height:1.65;color:var(--ink2);margin:7px 0 0}
.verify{font-size:12px;color:var(--gold-ink);margin-top:10px;font-weight:600}

/* hero grid */
.layers{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin:42px 0 0}
.layer{background:var(--card);border:1px solid var(--card-line);border-radius:14px;padding:21px 21px 19px;cursor:pointer;text-align:left;font-family:var(--sans);transition:transform .15s,box-shadow .15s,border-color .15s}
.layer:hover{transform:translateY(-3px);box-shadow:0 12px 30px -14px rgba(43,39,31,.32);border-color:var(--gold)}
.layer-top{display:flex;align-items:center;justify-content:space-between}
.layer-num{width:40px;height:40px;border-radius:10px;background:var(--navy);color:var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:19px}
.layer-ic{font-size:22px}
.layer-t{font-family:var(--serif);font-weight:600;font-size:18px;margin:14px 0 0}
.layer-d{font-size:13.5px;line-height:1.6;color:var(--mut);margin:7px 0 0}

/* fields */
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{margin:14px 0 0}
.field:first-child{margin-top:0}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:6px}
.field .hint{font-weight:400;color:var(--mut);font-size:12px}
.field input,.field textarea{width:100%;font-family:var(--sans);font-size:14.5px;color:var(--ink);background:#fff;border:1.5px solid var(--card-line);border-radius:10px;padding:11px 13px;transition:border-color .14s}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--gold)}
.field textarea{min-height:78px;resize:vertical;line-height:1.55}

/* timeline */
.tl{display:flex;flex-direction:column;gap:0}
.tl-item{position:relative;padding:0 0 18px 26px;border-left:2px solid var(--card-line)}
.tl-item:last-child{padding-bottom:0}
.tl-item::before{content:"";position:absolute;left:-7px;top:2px;width:12px;height:12px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 3px var(--card)}
.tl-item .d{font-weight:700;font-size:13.5px;color:var(--navy)}
.tl-item .e{font-size:14px;color:var(--ink2);margin-top:3px;line-height:1.6}

/* checklist */
.check{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--card-line);cursor:pointer}
.check:last-child{border-bottom:none}
.check input{margin-top:3px;width:18px;height:18px;accent-color:var(--gold2);flex-shrink:0}
.ct{display:block;font-size:14.5px;font-weight:500;color:var(--ink)}
.cs{display:block;font-size:12.5px;color:var(--mut);margin-top:2px}

/* petition document */
.doc{background:#fff;border:1px solid var(--card-line);border-radius:12px;padding:40px 42px;margin:18px 0 0;font-family:var(--doc);font-size:15.5px;line-height:1.95;color:#1d1a15;white-space:pre-wrap}
.doc .rt{text-align:right;white-space:pre-wrap}
.doc .center{text-align:center;white-space:pre-wrap;margin-top:8px}
.doc b{font-weight:600}
.fill{background:#fff4cc;border-bottom:1px dashed #d9b53a;padding:0 3px;border-radius:2px;font-style:normal}

/* contacts */
.contact{display:flex;gap:13px;align-items:flex-start;background:var(--card);border:1px solid var(--card-line);border-radius:12px;padding:15px 17px;margin:11px 0 0}
.contact .ci{width:34px;height:34px;border-radius:9px;background:#f1e6cf;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.contact b{font-size:14.5px}
.contact .cd{font-size:13px;color:var(--mut2);margin-top:3px;line-height:1.55}

/* dev */
.dev{margin:34px 0 0;border:1px dashed #c3b89f;border-radius:12px;background:#f3eee2}
.dev summary{cursor:pointer;padding:14px 18px;font-size:13px;font-weight:600;color:var(--mut2)}
.dev .body{padding:0 18px 16px;font-size:13px;line-height:1.7;color:var(--ink2)}
.dev code{background:#e7ddc8;padding:1px 6px;border-radius:5px;font-size:12.5px}

.disclaimer{margin:40px 0 0;padding-top:18px;border-top:1px solid var(--card-line);font-size:12.5px;color:var(--mut);line-height:1.7}

@media (max-width:860px){
  .sidebar{display:none;position:fixed;left:0;top:0;z-index:50;height:100vh;width:280px;box-shadow:6px 0 30px -10px rgba(0,0,0,.4)}
  .app.nav-open .sidebar{display:flex}
  .app.nav-open .scrim{display:block}
  .topbar{display:flex}
  .wrap{padding:26px 20px 80px}
  h1.q{font-size:27px}
  .hero-h{font-size:31px}
  .two{grid-template-columns:1fr}
  .layers{grid-template-columns:1fr}
  .doc{padding:26px 20px;font-size:14.5px}
  .opt{flex-wrap:wrap}
  .door{order:3}
}

@media print{
  .sidebar,.topbar,.scrim,.btn-row,.note.no-print,.dev,.eyebrow,.disclaimer,.lead{display:none!important}
  .main,.wrap{margin:0;padding:0;max-width:none}
  .doc{border:none;padding:0;margin:0}
  body{background:#fff}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="scrim" onclick="closeNav()"></div>

  <!-- top bar (mobile) -->
  <div class="topbar">
    <div class="brand-mark"><span>ต</span></div>
    <div class="topbar-name">ตั้งหลัก</div>
    <button class="menu-btn" onclick="toggleNav()" aria-label="เมนู">☰</button>
  </div>

  <!-- sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-row">
        <div class="brand-mark"><span>ต</span></div>
        <div>
          <div class="brand-name">ตั้งหลัก</div>
          <div class="brand-en">Foothold</div>
        </div>
      </div>
      <div class="brand-tag">เครื่องมือตั้งหลักเรื่องบัญชีม้า — ฟรี และข้อมูลไม่ออกจากเครื่องคุณ</div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot">
      <button class="lawyer-btn" onclick="go('next')"><span style="font-size:15px">⚖️</span> หาทนายความ</button>
      <div class="save-ind"><span class="save-dot"></span> ข้อมูลอยู่ในเครื่องนี้ · ไม่ถูกส่งออก</div>
    </div>
  </aside>

  <!-- main -->
  <main class="main">
    <div class="wrap"><div id="screen"></div></div>
  </main>
</div>

<script>
/* ===================== data model ===================== */
const STEPS = ['entry','triage','orient','subcase','pattern','facts','timeline','docs','prep','petition','download','next','glossary'];
const NAV = [
  {key:'entry',    num:'•', label:'หน้าแรก',     sub:'ภาพรวมและเริ่มต้น'},
  {key:'triage',   num:'1', label:'สถานะของคุณ',  sub:'คุณเป็น “สีม้า” ไหน'},
  {key:'orient',   num:'2', label:'ทางออก',        sub:'ธนาคาร หรือ คดี'},
  {key:'subcase',  num:'3', label:'สถานการณ์ย่อย',  sub:'6 เคสตามระเบียบจริง'},
  {key:'pattern',  num:'4', label:'เหตุการณ์',     sub:'รูปแบบเรื่องของคุณ'},
  {key:'facts',    num:'5', label:'ข้อเท็จจริง',    sub:'เล่าเรื่องของคุณ'},
  {key:'timeline', num:'6', label:'ไทม์ไลน์',      sub:'ลำดับเหตุการณ์'},
  {key:'docs',     num:'7', label:'เอกสาร',         sub:'เช็กลิสต์ก่อนไป'},
  {key:'prep',     num:'8', label:'เตรียมพบตำรวจ',   sub:'แนวคำถาม&หมายเรียก'},
  {key:'petition', num:'9', label:'คำร้อง',         sub:'ร่างหนังสือเพิกถอน'},
  {key:'download', num:'10',label:'ดาวน์โหลดฟอร์ม', sub:'แบบฟอร์มตามเคส'},
  {key:'next',     num:'11',label:'ส่งต่อ',         sub:'ธนาคาร / ทนาย'},
  {key:'glossary', num:'📚',label:'คำศัพท์&ติดต่อ', sub:'อักษรย่อ&ช่องทางด่วน'},
];

const state = {
  step:'entry',
  status:null,
  pattern:null,
  subcase:null,
  glossaryTab:'terms',
  facts:{ name:'', idcard:'', addr:'', phone:'', bank:'', acct:'',
          caseId:'', bankRef:'', officer:'', station:'',
          frozenWhen:'', frozenHow:'', involve:'', edd:'',
          isVictim:false, hasSummons:false,
          accountsList:'' },
  events:[],
  done:{}
};

/* horse-color taxonomy — door = which path the person actually takes (verified CFR/BOT) */
const STATUS = {
  brown_light: {label:'ม้าน้ำตาลอ่อน', sw:'#faf6ec', door:'bank',
                short:'FR01: ต้องสงสัยระดับแรก จำกัดบางธุรกรรม',
                meaning:'บัญชีถูกระงับเพราะระบบเฝ้าระวังพฤติกรรม (FR01) โดย<b>ยังไม่มีผู้เสียหายแจ้งความ ไม่มี Case ID และคุณยังไม่ใช่ผู้ต้องหา</b> — ปลดที่ธนาคารด้วยการทำ EDD'},
  brown_dark:  {label:'ม้าน้ำตาลเข้ม', sw:'#d8c4a8', door:'bank',
                short:'FR01 (เสี่ยงสูง): ธนาคารพบความเสี่ยงสูงแต่อาจยังไม่มีคดี',
                meaning:'บัญชีถูกระงับเนื่องจากธนาคารตรวจพบความผิดปกติที่ส่อไปในทางทุจริต (FR01/FR02) ยังไม่มีการออกหมายจับจากตำรวจ แต่ต้องผ่านการชี้แจงกับธนาคารอย่างเข้มข้น'},
  grey_light:  {label:'ม้าเทาอ่อน', sw:'#cdc7ba', door:'case',
                short:'CFR (เฝ้าระวัง): เส้นเงินผ่านบัญชีทุจริต ยังไม่แจ้งตำรวจ',
                meaning:'บัญชีมีรายชื่ออยู่ในเส้นทางเงินทุจริตในระบบ CFR (มี Case ID แล้ว) แต่<b>ยังไม่มีการแจ้งความดำเนินคดีกับตัวท่านโดยตรง</b> หรือยังไม่เข้าสู่การออกหมายอายัดทางอาญา'},
  grey_dark:   {label:'ม้าเทาเข้ม', sw:'#9a948a', door:'case',
                short:'CFR (มีคดี): เส้นเงินทุจริตชัดเจน มีผู้เสียหายแจ้งความแล้ว',
                meaning:'มีผู้เสียหายแจ้งความดำเนินคดีและมีเลข Case ID แล้ว พนักงานสอบสวนออกหมายอายัดถึงธนาคาร มีความเสี่ยงที่จะตกเป็นผู้ต้องหาสูงมาก'},
  black:       {label:'ม้าดำ', sw:'#26211c', door:'case',

function reached(key){
  if(key==='entry'||key==='triage'||key==='glossary') return true;
  if(!state.status) return false;
  const isCase = STATUS[state.status].door==='case';
  if(!isCase && ['subcase','pattern','prep'].includes(key)) return false;
  return true;
}
function go(step){
  if(!reached(step)) step='triage';
  state.step=step; closeNav(); render();
  document.querySelector('.main').scrollTop=0; window.scrollTo({top:0,behavior:'smooth'});
}
function setStatus(s){ state.status=s; state.done.triage=true; go('orient'); }
function markDone(k){ state.done[k]=true; }
function bind(id,path){ const el=document.getElementById(id); if(el) el.addEventListener('input',e=>{ const k=path.split('.'); let o=state; for(let i=0;i<k.length-1;i++)o=o[k[i]]; o[k[k.length-1]]=e.target.value; }); }
function toggleNav(){ appEl.classList.toggle('nav-open'); }
function closeNav(){ appEl.classList.remove('nav-open'); }

function shareLink(){
  const url = window.location.href;
  if(navigator.share){
    navigator.share({title:'ตั้งหลัก (Foothold)', url:url}).catch(console.error);
  }else{
    navigator.clipboard.writeText(url);
    alert('คัดลอกลิงก์แล้ว สามารถส่งให้ทนายดูได้: ' + url);
  }
}

function renderNav(){
  const cur = state.step;
  const isCase = state.status ? STATUS[state.status].door === 'case' : true;
  navEl.innerHTML = `<div class="nav-h">ขั้นตอน</div>` + NAV.filter(n=>{
    if(!isCase && ['subcase','pattern','prep'].includes(n.key)) return false;
    return true;
  }).map(n=>{
    const on = cur===n.key;
    const done = state.done[n.key] && !on;
    const lock = !reached(n.key);
    return `<button class="nav-item ${on?'on':''} ${done?'done':''} ${lock?'lock':''}" ${lock?'disabled':''} onclick="go('${n.key}')">
      <span class="nav-num">${n.num}</span>
      <span class="nav-tx"><span class="nav-lb">${n.label}</span><span class="nav-sb">${n.sub}</span></span>
      ${done?'<span class="nav-ck">✓</span>':''}
    </button>`;
  }).join('');
}

function screenPattern(){
  // เก็บ pattern ที่เลือกใน state
  if(!state.pattern) state.pattern=null;
  const pid = state.pattern;
  // หน้าเลือก pattern
  if(!pid){
    const cards = Object.entries(PATTERNS).map(([k,p])=>`<button class="opt" onclick="state.pattern='${k}';markDone('pattern');render()" style="flex-wrap:wrap">
      <span class="swatch" style="background:#faf6ec;display:flex;align-items:center;justify-content:center;font-size:18px">${p.icon}</span>
      <span style="flex:1;min-width:0"><span class="ttl">${p.label}</span><span class="sub">${p.lead}</span></span>
    </button>`).join('');
    return `<div class="screen">
      <div class="eyebrow">ขั้น 3 · เหตุการณ์</div>
      <h1 class="q">เลือกรูปแบบที่<u>ใกล้เคียง</u>เรื่องของคุณที่สุด</h1>
      <p class="lead">7 รูปแบบนี้ครอบคลุมเคสบัญชีม้าส่วนใหญ่ที่พบในไทย — เลือกอันที่ใกล้ที่สุด ระบบจะบอกข้อหาที่มักถูกตั้ง จุดที่ต้องพิสูจน์ และหลักฐานที่ควรเตรียม</p>
      <div class="note">${iInfo}<div class="t"><b>การเลือกรูปแบบ ≠ คำตัดสินว่าคุณผิด</b> — แต่ละรูปแบบมีทั้งคนที่ถูกหลอกจริงและคนที่รู้ตัว เครื่องมือนี้ช่วยจัดระเบียบเรื่อง เพื่อพิสูจน์ <b>ข้อเท็จจริงเฉพาะของคุณ</b></div></div>
      <div class="spectrum" style="margin-top:20px">${cards}</div>
      <div class="btn-row"><button class="btn btn-ghost" onclick="go('orient')">ย้อนกลับ</button></div>
    </div>`;
  }
  // หน้าผลของ pattern ที่เลือก
  const p = PATTERNS[pid];
  const charges = p.charges.map(c=>`<li>${c}</li>`).join('');
  const prove   = p.prove.map(c=>`<li>${c}</li>`).join('');
  const ev      = p.evidence.map(c=>`<li>${c}</li>`).join('');
  const qs      = p.questions.map(c=>`<li>${c}</li>`).join('');
  const anchors = ESCAPE_ANCHORS.map(a=>`<div class="law"><span class="tag">หลักฐานชุดที่ ${a.n}</span><h4>${a.t}</h4><p>${a.d}</p></div>`).join('');
  const warn = p.warn?`<div class="note warn">${iWarn}<div class="t">${p.warn}</div></div>`:'';
  return `<div class="screen">
    <div class="eyebrow">ขั้น 3 · เหตุการณ์ที่เลือก</div>
    <h1 class="q">${p.icon} ${p.label}</h1>
    <div class="card pad" style="margin-top:16px"><p style="margin:0;font-size:15px;line-height:1.7">${p.lead}</p></div>
    ${warn}
    <h2 class="q">ข้อหาที่มักถูกตั้งในเคสรูปแบบนี้</h2>
    <div class="card pad" style="margin-top:12px"><ul style="margin:0;padding-left:22px;line-height:1.85">${charges}</ul></div>
    <h2 class="q">จุดที่กฎหมายต้องพิสูจน์ "รู้ / ควรรู้"</h2>
    <p class="lead" style="margin-bottom:0">คำถามเหล่านี้คือสิ่งที่ศาลและพนักงานสอบสวนจะใช้พิจารณา — เตรียมคำตอบให้พร้อม</p>
    <div class="card pad" style="margin-top:12px"><ul style="margin:0;padding-left:22px;line-height:1.85">${prove}</ul></div>
    <h2 class="q">หลักฐานสำคัญที่ควรเก็บ/รวบรวม</h2>
    <div class="card pad" style="margin-top:12px"><ul style="margin:0;padding-left:22px;line-height:1.85">${ev}</ul></div>
    <h2 class="q">คำถามที่พนักงานสอบสวนมักถาม</h2>
    <p class="lead" style="margin-bottom:0">ซ้อมตอบตามความจริง — คำตอบไม่สอดคล้องกับหลักฐานคือจุดอ่อนที่สุด</p>
    <div class="card pad" style="margin-top:12px"><ul style="margin:0;padding-left:22px;line-height:1.85">${qs}</ul></div>
    <h2 class="q">เงื่อนไข 3 ข้อที่ทำให้คดีบัญชีม้า "หลุด" หรือ "ลดโทษ"</h2>
    <p class="lead" style="margin-bottom:0">จากแนวคำพิพากษา/อัยการสั่งไม่ฟ้อง — ยิ่งมีหลักฐานครบทั้ง 3 ข้อ ยิ่งดี</p>
    ${anchors}
    <div class="note calm">${iCheck}<div class="t"><b>ฎีกาที่ 4920/2567:</b> ศาลฎีกาวินิจฉัยว่าการรับจ้างเปิดบัญชีเป็นเรื่องผิดปกติวิสัย อ้างว่า "ถูกหลอก" ไม่ขึ้น (ในคดีนี้จำเลยอายุ 17 ปี ได้รับค่าจ้างเพียง 400 บาท/บัญชี แต่บัญชีถูกใช้รับเงิน 200,000 บาทจาก SMS phishing) → <b>เคสที่ "รับค่าจ้างเปิดบัญชี" ศาลจะตีว่า "ควรรู้" และผิดฐานผู้สนับสนุนเสมอ</b></div></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="state.pattern=null;render()">เลือกรูปแบบใหม่</button>
      <button class="btn btn-primary" onclick="go('facts')">เก็บข้อเท็จจริงของคุณ ${arrow}</button>
    </div>
  </div>`;
}

function buildTimeline(){
  const f=state.facts; const ev=[];
  if(state.pattern && PATTERNS[state.pattern]) ev.push({d:'รูปแบบเหตุการณ์', e:PATTERNS[state.pattern].label+' — '+PATTERNS[state.pattern].lead});
  if(f.isVictim) ev.push({d:'⚠️ สถานะผู้เสียหายหลัก', e:'ระบุว่าถูกข่มขู่ / บังคับกักขังหน่วงเหนี่ยวให้ทำธุรกรรมโดยไม่สมัครใจ'});
  if(f.hasSummons) ev.push({d:'⚠️ หมายเรียก', e:'ได้รับหมายเรียกตัวจริงจากพนักงานสอบสวนแล้ว'});
  if(f.frozenWhen||f.frozenHow) ev.push({d:f.frozenWhen||'(ระบุวันที่)', e:'บัญชีหลักถูกระงับ — '+(f.frozenHow||'ทราบว่าทำธุรกรรมไม่ได้')});
  if(f.accountsList) ev.push({d:'บัญชี/Wallet อื่นๆ ที่ถูกระงับร่วม', e:'\n'+f.accountsList});
  if(f.involve) ev.push({d:'ความเกี่ยวข้อง', e:f.involve});
  if(f.edd) ev.push({d:'การติดต่อธนาคาร (EDD)', e:f.edd});
  if(f.caseId) ev.push({d:'มีคดี', e:'เลขรับแจ้งความ (Case ID): '+f.caseId});
  state.events=ev; return ev;
}
